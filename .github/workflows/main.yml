name: Run Pipeline

on:
  push:
    branches: ["main"]

  schedule:
    - cron: '0 6 * * *'  # diario

  workflow_dispatch:     # 👈 ESTO AGREGA EL BOTÓN MANUAL

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t app .

      - name: Run container
        run: docker run app
